name: flyconnect
description: FlyConnect - Travel companion social app for airport employees
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Navigation & Deep Linking
  go_router: ^13.2.0

  # State Management
  provider: ^6.1.2

  # UI & Icons
  cupertino_icons: ^1.0.6
  flutter_svg: ^2.0.10+1

  # Media
  image_picker: ^1.0.7

  # Maps
  flutter_map: ^6.1.0
  latlong2: ^0.9.0

  # Firebase
  firebase_core: ^3.12.1
  firebase_auth: ^5.5.1
  cloud_firestore: ^5.6.5
  firebase_storage: ^12.4.4
  firebase_messaging: ^15.2.4
  firebase_crashlytics: ^4.3.4
  firebase_analytics: ^11.4.4

  # Social Sign-In (Google + Apple)
  google_sign_in: ^6.2.1
  sign_in_with_apple: ^6.1.4
  crypto: ^3.0.3
  package_info_plus: ^8.0.2

  # Utils
  shared_preferences: ^2.2.3
  intl: ^0.19.0
  uuid: ^4.3.3
  timeago: ^3.6.1
  url_launcher: ^6.2.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  mocktail: ^1.0.4
  fake_cloud_firestore: ^3.0.3
  firebase_auth_mocks: ^0.14.1
  flutter_launcher_icons: ^0.14.1
  flutter_native_splash: ^2.4.1

# ── App icon generation ─────────────────────────────────────────
# Source: assets/images/app_icon.png (1024x1024 PNG)
# Run: dart run flutter_launcher_icons
flutter_launcher_icons:
  image_path: "assets/images/app_icon.png"
  android: "launcher_icon"
  ios: true
  remove_alpha_ios: true
  min_sdk_android: 21
  adaptive_icon_background: "#1A1D27"
  adaptive_icon_foreground: "assets/images/app_icon.png"
  web:
    generate: true
    image_path: "assets/images/app_icon.png"
    background_color: "#1A1D27"
    theme_color: "#D4F53C"
  windows:
    generate: true
    image_path: "assets/images/app_icon.png"
    icon_size: 48

# ── Native splash screen ────────────────────────────────────────
# Run: dart run flutter_native_splash:create
flutter_native_splash:
  color: "#1A1D27"
  image: "assets/images/app_icon.png"
  android_12:
    color: "#1A1D27"
    image: "assets/images/app_icon.png"
  ios: true
  web: false

flutter:
  uses-material-design: true

  # Assets — add font files to assets/fonts/ before uncommenting.
  # See assets/fonts/README.md for the required Inter TTFs.
  #
  # fonts:
  #   - family: Inter
  #     fonts:
  #       - asset: assets/fonts/Inter-Regular.ttf
  #         weight: 400
  #       - asset: assets/fonts/Inter-Medium.ttf
  #         weight: 500
  #       - asset: assets/fonts/Inter-SemiBold.ttf
  #         weight: 600
  #       - asset: assets/fonts/Inter-Bold.ttf
  #         weight: 700
  #       - asset: assets/fonts/Inter-ExtraBold.ttf
  #         weight: 800
  #
  assets:
    - assets/images/
